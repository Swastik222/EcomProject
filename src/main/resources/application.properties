spring.application.name=EcomProject
server.port=${PORT:8080}

spring.datasource.username=${DB_USERNAME:sm}
spring.datasource.password=${DB_PASSWORD:sm}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecom_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Hibernate settings for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.jpa.defer-datasource-initialization=true

# Increase upload limits for product images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── JWT ───────────────────────────────────────────────────────────────
# 256-bit Base64-encoded secret (CHANGE IN PRODUCTION)
app.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktzZWNyZXQtY2hhbmdlLXRoaXMta2V5LTEyMzQ1Ng==}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Disable Spring Security auto-user (we seed our own admin)
spring.security.user.name=disabled
spring.security.user.password=disabled
